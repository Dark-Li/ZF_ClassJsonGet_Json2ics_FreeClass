<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影沈理课程表管理系统</title>
    <style>
        :root {
            --bg-deep: #071a2d;
            --bg-mid: #0b2e4d;
            --bg-soft: #11406a;
            --card: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.22);
            --text-main: #eaf4ff;
            --text-sub: #bcd0e2;
            --accent: #14d4c5;
            --accent-2: #ffb74d;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 15% 20%, rgba(20, 212, 197, 0.18), transparent 35%),
                radial-gradient(circle at 85% 15%, rgba(255, 183, 77, 0.17), transparent 40%),
                radial-gradient(circle at 60% 80%, rgba(72, 163, 255, 0.22), transparent 30%),
                linear-gradient(145deg, var(--bg-deep), var(--bg-mid) 45%, var(--bg-soft));
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.2;
            background-image: linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(circle at center, black 35%, transparent 100%);
        }

        .wrapper {
            width: min(1120px, 92vw);
            margin: 0 auto;
            padding: 48px 0 34px;
            position: relative;
            z-index: 1;
        }

        .hero {
            border: 1px solid var(--card-border);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04));
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 38px 34px;
            box-shadow: var(--shadow);
            animation: riseIn 0.8s ease forwards;
        }

        .hero-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: rgba(20, 212, 197, 0.14);
            border: 1px solid rgba(20, 212, 197, 0.45);
            color: #c8fff8;
        }

        .clock {
            font-size: 14px;
            color: var(--text-sub);
        }

        h1 {
            font-size: clamp(1.9rem, 2.8vw, 2.9rem);
            line-height: 1.15;
            margin-bottom: 12px;
            letter-spacing: 0.03em;
        }

        .lead {
            font-size: 1rem;
            color: var(--text-sub);
            max-width: 760px;
        }

        .modules {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 22px;
        }

        .module {
            position: relative;
            border-radius: 20px;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 26px 22px;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
            opacity: 0;
            transform: translateY(26px);
            animation: riseIn 0.7s ease forwards;
        }

        .module:nth-child(1) {
            animation-delay: 0.2s;
        }

        .module:nth-child(2) {
            animation-delay: 0.32s;
        }

        .module:nth-child(3) {
            animation-delay: 0.44s;
        }

        .module::after {
            content: "";
            position: absolute;
            inset: auto -20% -40% -20%;
            height: 120px;
            background: radial-gradient(circle at center, rgba(20, 212, 197, 0.26), transparent 70%);
            pointer-events: none;
        }

        .module:hover {
            border-color: rgba(20, 212, 197, 0.62);
            box-shadow: 0 18px 40px rgba(3, 15, 25, 0.45);
            transform: translateY(-8px);
        }

        .icon-wrap {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            margin-bottom: 14px;
            background: linear-gradient(135deg, rgba(20, 212, 197, 0.25), rgba(20, 212, 197, 0.08));
            border: 1px solid rgba(20, 212, 197, 0.55);
        }

        .module h2 {
            font-size: 1.25rem;
            margin-bottom: 8px;
        }

        .module p {
            color: var(--text-sub);
            font-size: 0.95rem;
            line-height: 1.55;
            margin-bottom: 18px;
            min-height: 64px;
        }

        .module a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #052329;
            text-decoration: none;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), #67f0e3);
            padding: 11px 16px;
            border-radius: 12px;
            transition: transform 0.25s ease, filter 0.25s ease;
        }

        .module a:hover {
            filter: brightness(1.06);
            transform: translateX(4px);
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            color: rgba(220, 236, 255, 0.72);
            font-size: 14px;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(26px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 980px) {
            .modules {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 680px) {
            .wrapper {
                width: 92vw;
                padding-top: 28px;
            }

            .hero {
                padding: 24px 18px;
                border-radius: 18px;
            }

            .modules {
                grid-template-columns: 1fr;
                gap: 14px;
                margin-top: 20px;
            }

            .module p {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <main class="wrapper">
        <section class="hero">
            <div class="hero-top">
                <span class="badge">光影沈理 · 智能课表工作台</span>
                <span class="clock" id="liveClock"></span>
            </div>
            <h1>课程数据一体化管理</h1>
            <p class="lead">从教务系统采集、日历导出，到空课洞察分析，统一在一个页面流中完成。界面针对桌面、平板、手机全面适配，并提供流畅的交互反馈。</p>

            <div class="modules">
                <article class="module" data-tilt>
                    <div class="icon-wrap" aria-hidden="true">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M5 4h14v16H5z" stroke="#84FFF0" stroke-width="1.8"/>
                            <path d="M8 9h8M8 13h5" stroke="#84FFF0" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h2>课程表获取</h2>
                    <p>通过学号与密码快速拉取最新学期课程信息，自动写入 JSON 数据目录。</p>
                    <a href="/get_json_class">进入功能 <span>→</span></a>
                </article>

                <article class="module" data-tilt>
                    <div class="icon-wrap" aria-hidden="true">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M6 5h12v14H6z" stroke="#84FFF0" stroke-width="1.8"/>
                            <path d="M9 9h6M9 12h6M9 15h4" stroke="#84FFF0" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h2>转换与统计</h2>
                    <p>把课程 JSON 批量转换为 ICS，并输出空课统计 Excel 供班级协作使用。</p>
                    <a href="/json2ics">进入功能 <span>→</span></a>
                </article>

                <article class="module" data-tilt>
                    <div class="icon-wrap" aria-hidden="true">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="8" stroke="#84FFF0" stroke-width="1.8"/>
                            <path d="M12 8v4l3 2" stroke="#84FFF0" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h2>空课程查询</h2>
                    <p>支持周视图、日视图与特定时段查询，快速定位同学空闲窗口。</p>
                    <a href="/web_view">进入功能 <span>→</span></a>
                </article>
            </div>
        </section>

        <footer class="footer">
            光影沈理工作室 © <span id="yearNum"></span>
        </footer>
    </main>

    <script>
        (function () {
            const now = new Date();
            const liveClock = document.getElementById("liveClock");
            const yearNum = document.getElementById("yearNum");

            function pad(n) {
                return String(n).padStart(2, "0");
            }

            function updateClock() {
                const d = new Date();
                liveClock.textContent = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
            }

            yearNum.textContent = now.getFullYear();
            updateClock();
            setInterval(updateClock, 1000);

            const cards = document.querySelectorAll("[data-tilt]");
            cards.forEach((card) => {
                card.addEventListener("mousemove", (e) => {
                    if (window.innerWidth < 900) {
                        return;
                    }
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const rotateY = (x / rect.width - 0.5) * 8;
                    const rotateX = (0.5 - y / rect.height) * 8;
                    card.style.transform = `translateY(-8px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                });

                card.addEventListener("mouseleave", () => {
                    card.style.transform = "translateY(0) rotateX(0) rotateY(0)";
                });
            });
        })();
    </script>
</body>
</html>
